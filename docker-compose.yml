version: "3.9"

# Shared environment for both app instances
x-app-env: &app-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ticketing_db
  SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
  JWT_SECRET: ${JWT_SECRET}
  STRIPE_API_KEY: ${STRIPE_API_KEY}
  PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
  PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}

x-app-healthcheck: &app-healthcheck
  test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 60s

# Shared resource limits
x-app-resources: &app-resources
  limits:
    cpus: "1.0"
    memory: 768M
  reservations:
    cpus: "0.25"
    memory: 256M

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ticketing_db
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ticketing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
    ports:
    - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ticketing-system:latest
    restart: unless-stopped
    environment:
      <<: *app-env
      SPRING_APPLICATION_NAME: ticketing-app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *app-healthcheck
    deploy:
      resources: *app-resources
      replicas: 1
    expose:
      - "8080"
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: ticketing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ticketing_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    networks:
      - backend

  tempo:
    image: grafana/tempo:2.5.0
    container_name: ticketing_tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "4318:4318"    # OTLP gRPC
      - "3200:3200"    # Tempo HTTP
    networks:
      - backend

  # Grafana
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ticketing_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_ENABLE_ALPHA: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/ticketing.json:ro
    depends_on:
      - prometheus
      - tempo
    networks:
      - backend
      - frontend

networks:
  frontend:
    driver: bridge
    name: ticketing_frontend
  backend:
    driver: bridge
    name: ticketing_backend

volumes:
  postgres_data:
    name: ticketing_postgres_data
  prometheus_data:
    name: ticketing_prometheus_data
  grafana_data:
    name: ticketing_grafana_data
  nginx_logs:
    name: ticketing_nginx_logs
  tempo_data:
    name: ticketing_tempo_data

