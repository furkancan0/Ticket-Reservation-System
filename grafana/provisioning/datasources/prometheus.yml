apiVersion: 1
datasources:
  # ── Prometheus ───────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus-ticketing
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        # When a metric has an exemplar, clicking it jumps to the trace in Tempo
        - name: traceID
          datasourceUid: tempo-ticketing

  # ── Grafana Tempo ─────────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo-ticketing
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: ""   # add Loki uid here
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: prometheus-ticketing
        queries:
          - name: "Request rate"
            query: "rate(http_server_requests_seconds_count{$$__tags}[5m])"
      serviceMap:
        datasourceUid: prometheus-ticketing
      nodeGraph:
        enabled: true
      search:
        hide: false
