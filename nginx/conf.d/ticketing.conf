# ── HTTPS + Proxy ─────────────────────────────────────────────────────────────
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # checkout calls Stripe/PayPal which can take up to 10s
    proxy_connect_timeout   5s;
    proxy_send_timeout     15s;
    proxy_read_timeout     15s;

    # Common proxy headers
    proxy_http_version  1.1;
    proxy_set_header    Connection        "";
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    X-Request-ID      $request_id;  # trace ID through the stack

    # Buffering
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    # Max parallel connections per client IP
    limit_conn conn_limit 50;


    # Auth endpoints (rate limit — 100 req/min per IP)
    location /api/auth/ {
        limit_req zone=auth_limit burst=100 nodelay;

        proxy_pass http://ticketing_app;
    }

    # Checkout  (rate limit — 100 req/min per IP)
    location /api/orders/checkout {
        limit_req zone=checkout_limit burst=100 nodelay;

        proxy_read_timeout 20s;

        proxy_pass http://ticketing_app;
    }

    # All other API endpoints  (400 req/min per IP)
    location /api/ {
        limit_req zone=api_limit burst=400 nodelay;

        proxy_pass http://ticketing_app;
    }

    # Health check  (public, no auth)
    location /actuator/health {
        proxy_pass http://ticketing_app;
        access_log off;
    }

    # Block all other Actuator endpoints from the public internet
    location /actuator/ {
        deny  all;
        return 403;
    }

    # NGINX stub_status  (scraped by Prometheus nginx-exporter)
    location /metrics/nginx {
        stub_status;
        allow  127.0.0.1;
        allow  10.0.0.0/8;
        allow  172.16.0.0/12;
        allow  192.168.0.0/16;
        deny   all;
        access_log off;
    }

    # Block sensitive paths
    location ~ /\.(git|env|htpasswd) {
        deny all;
        return 404;
    }

    # Default: 404 for anything not matched above
    location / {
        return 404;
    }

    # Custom error pages
    error_page 429 /429.json;
    error_page 502 503 504 /5xx.json;

    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"status":429,"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
    }

    location = /5xx.json {
        internal;
        default_type application/json;
        return 503 '{"status":503,"error":"Service Unavailable","message":"The ticketing service is temporarily unavailable. Please try again shortly."}';
    }
}
