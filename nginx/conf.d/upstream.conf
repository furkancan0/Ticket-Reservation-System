# ── Authenticated traffic — sticky by JWT ─────────────────────────────────────
upstream ticketing_app {

    # Consistent hash on Authorization header → same JWT → same instance
    hash $http_authorization consistent;

    server app:8080 max_fails=3 fail_timeout=30s;

    keepalive 64;
    keepalive_requests 10000;
    keepalive_timeout  60s;
}

# ── Unauthenticated traffic — load balanced ───────────────────────────────────
# Login, register, GET /events, GET /events/:id/seats are public endpoints
# with no JWT. Distribute them with least_conn for even load.
upstream ticketing_app_public {

    least_conn;

    server app:8080 max_fails=3 fail_timeout=30s;

    keepalive 32;
    keepalive_requests 10000;
    keepalive_timeout  60s;
}