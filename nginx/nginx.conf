user  nginx;

# One worker per CPU core.
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# Max simultaneous connections = worker_processes × worker_connections
events {
    worker_connections  1024;
    use                 epoll;       # Linux async I/O (best for high concurrency)
    multi_accept        on;          # Accept all pending connections in one syscall
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_status":"$upstream_status",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # Gzip compression
    gzip              on;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # Security headers (applied globally)
    add_header X-Frame-Options           DENY              always;
    add_header X-Content-Type-Options    nosniff           always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           no-referrer       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide NGINX version from error pages and Server header
    server_tokens off;

    #Client body / timeout
    client_max_body_size    10m;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;

    # Rate limiting
    # Shared memory zone: 10 MB stores ~160 000 IP states
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=200r/s;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m     rate=20r/s;
    limit_req_zone  $binary_remote_addr  zone=checkout_limit:10m rate=30r/s;

    # Return 429 on rate limit hit
    limit_req_status 429;

    # Connection limiting
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
